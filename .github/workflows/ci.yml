name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: padel_tournaments
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (black, isort, ruff, flake8, mypy)
        run: |
          black --check app tests
          isort --check-only app tests
          ruff check app tests
          flake8 app tests
          mypy app

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/padel_tournaments
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/padel_tournaments
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          DEBUG: "true"
        run: python -m alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/padel_tournaments
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/padel_tournaments
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          DEBUG: "true"
        run: pytest tests/ -v --tb=short
