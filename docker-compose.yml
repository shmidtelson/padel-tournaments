# Local development: Postgres + Procrastinate queues
# Non-default port (5433) to avoid conflict with local Postgres on 5432.
# Backend and frontend run locally (uv run uvicorn / npm run dev).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel_tournaments
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Queue worker (Procrastinate uses the same DB)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/padel_tournaments
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
