# Локальная разработка: Postgres + очереди Procrastinate
# Порты нестандартные (5433), чтобы не конфликтовать с локальным Postgres на 5432.
# Backend и frontend запускаются локально (uv run uvicorn / npm run dev).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel_tournaments
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Воркер очередей (Procrastinate использует ту же БД)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/padel_tournaments
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
